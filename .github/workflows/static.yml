# 将静态内容部署到 GitHub Pages 的简单工作流
名称: 将静态内容部署到 Pages

启用:
  # 在推送到默认分支时运行
推送:
分支: ["main"]

  # 允许您从“操作”选项卡手动运行此工作流
工作流调度:

# 将 GITHUB_TOKEN 的权限设置为允许部署到 GitHub Pages
权限:
内容: 读取
页面: 写入
: 写入

# 仅允许一次并发部署，跳过正在进行的部署与最新排队之间已有的运行。
# 但请勿取消正在进行的部署，因为我们希望这些生产部署能够顺利完成。
并发:
组: “页面”
假

作业:
  # 单次部署任务，因为我们只是进行部署
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
: ubuntu-latest
步骤:
      - 名称: 检出
        uses: actions/checkout@v4
      - 名称: 设置页面
用途: actions/configure-pages@v5
      - 名称: 上传工件
用途: actions/upload-pages-artifact@v3
与:
          # 上传整个仓库
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
